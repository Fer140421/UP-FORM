<div class="card-header-container">
  <h1 class="section-title">Instituciones</h1>
  <button mat-flat-button color="primary" (click)="openForm()">
    <mat-icon>add</mat-icon> Nueva Institución
  </button>
</div>

<mat-card class="table-card">
  @if (loading()) {
    <mat-progress-bar mode="indeterminate"></mat-progress-bar>
  }
  <div class="table-container">
    <table mat-table [dataSource]="instituciones()" class="modern-table">
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef> ID </th>
        <td mat-cell *matCellDef="let element"> <span class="badge-id">#{{element.id}}</span> </td>
      </ng-container>

      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef> Nombre de la Institución </th>
        <td mat-cell *matCellDef="let element" class="font-semibold"> {{element.nombre}} </td>
      </ng-container>

      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef class="text-right"> Acciones </th>
        <td mat-cell *matCellDef="let element" class="text-right">
          <button mat-stroked-button color="primary" class="btn-ingresar" (click)="ingresar(element)" matTooltip="Ver Cargos">
            <mat-icon>login</mat-icon> Ingresar
          </button>
          <button mat-icon-button class="btn-edit" (click)="openForm(element)" matTooltip="Editar">
            <mat-icon>edit_note</mat-icon>
          </button>
          <button mat-icon-button class="btn-delete" (click)="delete(element.id)" matTooltip="Eliminar">
            <mat-icon>delete_sweep</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell empty-cell" [attr.colspan]="displayedColumns.length">
          @if (!loading()) {
            <div class="empty-state">
              <mat-icon>business</mat-icon>
              <p>No se encontraron instituciones registradas.</p>
            </div>
          }
        </td>
      </tr>
    </table>
  </div>
</mat-card>
