<h2 mat-dialog-title>{{ data?.id ? 'Editar' : 'Nueva' }} Institución</h2>
<mat-dialog-content>
  <form [formGroup]="form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Nombre de la Institución</mat-label>
      <input matInput formControlName="nombre" required>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Sigla</mat-label>
      <input matInput formControlName="sigla" placeholder="Ej. TSE">
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close [disabled]="loading()">Cancelar</button>
  <button mat-raised-button color="primary" [disabled]="form.invalid || loading()" (click)="save()">
    @if (loading()) {
      <mat-spinner diameter="20" style="display: inline-block; margin-right: 8px;"></mat-spinner>
      Guardando...
    } @else {
      Guardar
    }
  </button>
</mat-dialog-actions>

<style>
  .full-width { width: 100%; margin-top: 10px; }
  mat-spinner { vertical-align: middle; }
</style>
