<div class="card-header-container">
  <h1 class="section-title">Requisitos de Puestos</h1>
  <button mat-flat-button color="primary" (click)="openForm()">
    <mat-icon>add</mat-icon> Nuevo Requisito
  </button>
</div>

<mat-card class="table-card">
  <div class="table-container">
    <table mat-table [dataSource]="requisitos()" class="modern-table">
      <ng-container matColumnDef="institucion">
        <th mat-header-cell *matHeaderCellDef> Institución </th>
        <td mat-cell *matCellDef="let element"> {{element.institucionNombre}} </td>
      </ng-container>

      <ng-container matColumnDef="cargo">
        <th mat-header-cell *matHeaderCellDef> Denominación Cargo </th>
        <td mat-cell *matCellDef="let element" class="font-semibold"> {{element.denominacionCargo}} </td>
      </ng-container>

      <ng-container matColumnDef="unidad">
        <th mat-header-cell *matHeaderCellDef> Unidad de Puesto </th>
        <td mat-cell *matCellDef="let element"> {{element.unidadPuesto}} </td>
      </ng-container>

      <ng-container matColumnDef="estado">
        <th mat-header-cell *matHeaderCellDef> Estado </th>
        <td mat-cell *matCellDef="let element">
          <span class="badge-status" [class.active]="element.estado === 'Activo'">
            {{element.estado}}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef class="text-right"> Acciones </th>
        <td mat-cell *matCellDef="let element" class="text-right">
          <button mat-icon-button class="btn-edit" (click)="openForm(element)" matTooltip="Editar">
            <mat-icon>edit_note</mat-icon>
          </button>
          <button mat-icon-button class="btn-delete" (click)="delete(element.id)" matTooltip="Eliminar">
            <mat-icon>delete_sweep</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell empty-cell" [attr.colspan]="displayedColumns.length">
          <div class="empty-state">
            <mat-icon>rule</mat-icon>
            <p>No se encontraron requisitos de puestos configurados.</p>
          </div>
        </td>
      </tr>
    </table>
  </div>
</mat-card>
