<div class="card-header-container">
  <div>
    <h1 class="section-title">Asignaciones</h1>
    <p class="section-subtitle">Gestione los cargos por institución y asigne los mejores candidatos.</p>
  </div>
  <div class="header-actions">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Buscar institución</mat-label>
      <input matInput (keyup)="applyFilter($event)" placeholder="Ej. Ministerio" #input>
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
  </div>
</div>

<mat-card class="table-card">
  @if (loading()) {
    <mat-progress-bar mode="indeterminate"></mat-progress-bar>
  }
  <div class="table-container">
    <table mat-table [dataSource]="dataSource" matSort class="modern-table">
      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Institución </th>
        <td mat-cell *matCellDef="let element" class="font-semibold"> {{element.nombre}} </td>
      </ng-container>

      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef class="text-right"> Acciones </th>
        <td mat-cell *matCellDef="let element" class="text-right">
          <button mat-stroked-button color="primary" class="btn-manage" (click)="openAsignacion(element)">
            <mat-icon>login</mat-icon> Ingresar
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell empty-cell" [attr.colspan]="displayedColumns.length">
          @if (!loading()) {
            <div class="empty-state">
              <mat-icon>business</mat-icon>
              <p>No se encontraron resultados para "{{input.value}}"</p>
            </div>
          }
        </td>
      </tr>
    </table>
  </div>
  <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" aria-label="Seleccionar página"></mat-paginator>
</mat-card>
